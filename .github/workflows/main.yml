name: Beastly Cloud Transporter
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct Link to Movie'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pyrogram tgcrypto yt-dlp

      - name: Download Movie
        run: |
          # Uses yt-dlp to download from the link you provide
          yt-dlp -o "movie.mp4" "${{ github.event.inputs.url }}"

      - name: Run Uploader
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python upload_script.py
