name: Beastly Torrent Transporter
on:
  workflow_dispatch:
    inputs:
      torrent_url:
        description: 'Direct Link to .torrent file or Magnet Link'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2
          pip install pyrogram tgcrypto

      - name: Download Torrent
        run: |
          # This will try to download for 15 minutes (900s). 
          # If it hits 99% and stalls, it will force move to the next step.
          timeout 900 aria2c --seed-time=0 --dir=./downloads "${{ github.event.inputs.torrent_url }}" || true

      - name: Run Uploader
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python upload_script.py

      - name: Commit and Push Database
        run: |
          git config --global user.name "telecstorage"
          git config --global user.email "telecstorage@gmail.com"
          git add database.json
          git commit -m "Update movie database" || echo "No changes"
          git push
