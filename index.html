<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beastly Cinema | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background-color: #080b13; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Splash Screen Animation */
        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out;
        }
        .logo-anim {
            font-size: 4rem; font-weight: 900; letter-spacing: -4px;
            background: linear-gradient(to right, #06b6d4, #3b82f6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

        /* Sidebar & Cards */
        .sidebar { background: #0f172a; border-right: 1px solid #1e293b; }
        .movie-card { transition: all 0.4s ease; }
        .movie-card:hover { transform: translateY(-10px); border-color: #38bdf8; }
        
        /* Video Player Overrides */
        #video-player-container { display: none; position: fixed; inset: 0; z-index: 1000; background: #000; }
        .plyr--full-ui { height: 100vh; width: 100vw; }
    </style>
</head>
<body class="flex">

    <div id="splash-screen">
        <div class="logo-anim">BEASTLY</div>
        <div class="mt-4 w-48 h-1 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full bg-cyan-500 animate-[progress_2s_ease-in-out]"></div>
        </div>
        <p class="mt-4 text-slate-500 text-sm tracking-widest uppercase">Loading Cinematic Experience</p>
    </div>

    <div class="sidebar w-64 h-screen sticky top-0 flex flex-col p-6 hidden md:flex">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-cyan-500 p-2 rounded-lg"><i class="fas fa-play text-white"></i></div>
            <span class="text-xl font-black text-white uppercase">Beastly</span>
        </div>
        <nav class="space-y-6">
            <a href="#" class="flex items-center gap-4 text-cyan-400 font-bold"><i class="fas fa-home"></i> Home</a>
            <a href="#" class="flex items-center gap-4 hover:text-cyan-400 transition"><i class="fas fa-th-large"></i> Categories</a>
            <a href="#" class="flex items-center gap-4 hover:text-cyan-400 transition"><i class="fas fa-bookmark"></i> Library</a>
        </nav>
    </div>

    <main id="main-content" class="flex-1 p-4 md:p-10 opacity-0 transition-opacity duration-1000 overflow-y-auto h-screen">
        <div class="flex justify-between items-center mb-10">
            <div class="relative w-full max-w-xl">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="searchInput" placeholder="Search for movies..." 
                       class="w-full bg-slate-900 border border-slate-800 p-3 pl-12 rounded-full focus:ring-2 ring-cyan-500 outline-none transition">
            </div>
        </div>

        <div class="relative h-96 rounded-3xl overflow-hidden mb-12 group shadow-2xl">
            <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?w=1600" class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition duration-700">
            <div class="absolute inset-0 bg-gradient-to-t from-[#080b13] via-transparent p-10 flex flex-col justify-end">
                <h2 class="text-6xl font-black mb-4 uppercase">All of Us Are Dead</h2>
                <div class="flex gap-4">
                    <button onclick="playMovie(24)" class="bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-cyan-400 transition flex items-center gap-2">
                        <i class="fas fa-play"></i> PLAY NOW
                    </button>
                </div>
            </div>
        </div>

        <h3 class="text-2xl font-bold mb-6 flex items-center gap-3"><span class="w-1 h-6 bg-cyan-500"></span> Episodes</h3>
        <div id="movieGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </main>

    <div id="video-player-container">
        <button onclick="closePlayer()" class="absolute top-8 left-8 text-white text-2xl z-[1001] bg-black/50 w-12 h-12 rounded-full hover:bg-cyan-500 transition">
            <i class="fas fa-arrow-left"></i>
        </button>
        <video id="mainPlayer" playsinline controls class="w-full h-full"></video>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const STREAM_BASE = "https://zbro7-cs.hf.space/stream/";
        let player;

        // Splash Screen Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('main-content').style.opacity = '1';
                document.body.style.overflowY = 'auto';
                setTimeout(() => document.getElementById('splash-screen').remove(), 800);
            }, 2500);
        });

        // Initialize Player
        player = new Plyr('#mainPlayer', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
            seekTime: 10
        });

        async function init() {
            const response = await fetch('database.json');
            const data = await response.json();
            renderMovies(data);
        }

        function renderMovies(movies) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            movies.forEach(movie => {
                const div = document.createElement('div');
                div.className = "movie-card bg-slate-900 rounded-xl overflow-hidden cursor-pointer border border-slate-800";
                div.innerHTML = `
                    <div class="aspect-video relative group">
                        <img src="${movie.poster || 'https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=400'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-cyan-500/20 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                            <i class="fas fa-play-circle text-5xl"></i>
                        </div>
                    </div>
                    <div class="p-3"><h4 class="font-bold text-sm truncate">${movie.title}</h4></div>
                `;
                div.onclick = () => playMovie(movie.msg_id);
                grid.appendChild(div);
            });
        }

        function playMovie(id) {
            const container = document.getElementById('video-player-container');
            const video = document.getElementById('mainPlayer');
            player.source = {
                type: 'video',
                sources: [{ src: STREAM_BASE + id, type: 'video/mp4' }]
            };
            container.style.display = 'block';
            player.play();
        }

        function closePlayer() {
            player.pause();
            document.getElementById('video-player-container').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
