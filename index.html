<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beastly Cinema | Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #080b13; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .sidebar { background: #0f172a; border-right: 1px solid #1e293b; transition: all 0.3s; }
        .movie-card { transition: all 0.4s ease; border: 1px solid transparent; }
        .movie-card:hover { transform: translateY(-10px); border-color: #38bdf8; box-shadow: 0 0 20px rgba(56, 189, 248, 0.2); }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #080b13; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        #video-player-container { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.95); }
    </style>
</head>
<body class="flex">

    <div class="sidebar w-64 h-screen sticky top-0 flex flex-col p-6 hidden md:flex">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-cyan-500 p-2 rounded-lg"><i class="fas fa-play text-white"></i></div>
            <span class="text-xl font-black tracking-tighter text-white">BEASTLY</span>
        </div>
        
        <nav class="space-y-6">
            <a href="#" class="flex items-center gap-4 text-cyan-400 font-bold"><i class="fas fa-home w-5"></i> Home</a>
            <a href="#" class="flex items-center gap-4 hover:text-cyan-400 transition"><i class="fas fa-th-large w-5"></i> Categories</a>
            <a href="#" class="flex items-center gap-4 hover:text-cyan-400 transition"><i class="fas fa-bookmark w-5"></i> Library</a>
            <a href="#" class="flex items-center gap-4 hover:text-cyan-400 transition"><i class="fas fa-history w-5"></i> Recently Watched</a>
        </nav>

        <div class="mt-auto p-4 bg-slate-800/50 rounded-xl border border-slate-700">
            <p class="text-xs text-slate-400">Logged in as</p>
            <p class="text-sm font-bold text-white">Beastly Admin</p>
        </div>
    </div>

    <main class="flex-1 p-4 md:p-10">
        <div class="flex justify-between items-center mb-10">
            <div class="relative w-full max-w-xl">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="searchInput" placeholder="Search for movies, TV shows..." 
                       class="w-full bg-slate-900 border border-slate-800 p-3 pl-12 rounded-full focus:ring-2 ring-cyan-500 focus:outline-none transition">
            </div>
            <div class="flex gap-4 ml-4">
                <button class="bg-slate-800 p-3 rounded-full hover:bg-slate-700"><i class="fas fa-bell"></i></button>
                <div class="w-10 h-10 bg-gradient-to-tr from-cyan-500 to-blue-600 rounded-full border-2 border-slate-700"></div>
            </div>
        </div>

        <div class="relative h-80 rounded-3xl overflow-hidden mb-12 shadow-2xl">
            <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?auto=format&fit=crop&q=80&w=2070" class="w-full h-full object-cover opacity-50">
            <div class="absolute inset-0 bg-gradient-to-t from-[#080b13] via-transparent p-10 flex flex-col justify-end">
                <span class="bg-cyan-500 text-xs font-bold px-3 py-1 rounded-full w-fit mb-4">TRENDING SERIES</span>
                <h2 class="text-5xl font-black mb-2 uppercase">All of Us Are Dead</h2>
                <p class="text-slate-300 max-w-md mb-6">A high school becomes ground zero for a zombie virus outbreak. Trapped students must fight their way out.</p>
                <div class="flex gap-4">
                    <button class="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-cyan-400 transition">Play Now</button>
                    <button class="bg-slate-800/80 px-8 py-3 rounded-full font-bold backdrop-blur-md">Add Library</button>
                </div>
            </div>
        </div>

        <h3 class="text-2xl font-bold mb-6 flex items-center gap-3">
            <span class="w-2 h-8 bg-cyan-500 rounded-full"></span>
            Continue Watching
        </h3>
        
        <div id="movieGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            </div>
    </main>

    <div id="video-player-container">
        <button onclick="closePlayer()" class="absolute top-10 right-10 text-3xl text-white hover:text-cyan-400 z-50"><i class="fas fa-times"></i></button>
        <video id="mainPlayer" controls class="w-full h-full">
            <source src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        // CONFIG: Replace with your Hugging Face Space URL
        const STREAM_BASE = "https://zbro7-cs.hf.space/stream/";

        async function init() {
            try {
                const response = await fetch('database.json');
                const data = await response.json();
                renderMovies(data);
                
                // Search Logic
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const filtered = data.filter(m => m.title.toLowerCase().includes(e.target.value.toLowerCase()));
                    renderMovies(filtered);
                });
            } catch (err) {
                console.error("Database failed to load", err);
            }
        }

        function renderMovies(movies) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            movies.forEach(movie => {
                const div = document.createElement('div');
                div.className = "movie-card bg-slate-900 rounded-2xl overflow-hidden shadow-xl cursor-pointer";
                div.innerHTML = `
                    <div class="aspect-video bg-slate-800 relative group">
                        <img src="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                            <i class="fas fa-play text-4xl text-cyan-400"></i>
                        </div>
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold text-sm truncate">${movie.title}</h4>
                        <p class="text-xs text-slate-500 mt-1 uppercase tracking-widest">Action • Horror</p>
                    </div>
                `;
                div.onclick = () => playMovie(movie.msg_id);
                grid.appendChild(div);
            });
        }

        function playMovie(id) {
            const container = document.getElementById('video-player-container');
            const video = document.getElementById('mainPlayer');
            video.src = STREAM_BASE + id;
            container.style.display = 'flex';
            video.play();
        }

        function closePlayer() {
            const container = document.getElementById('video-player-container');
            const video = document.getElementById('mainPlayer');
            video.pause();
            container.style.display = 'none';
        }

        init();
    </script>
</body>
</html>
